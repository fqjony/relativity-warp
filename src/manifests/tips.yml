- Group: Common
  Tips:
    - Tip: Prefer clear, descriptive names over brevity
      Why: Readable code reduces onboarding time and lowers the risk of misinterpretation during maintenance.
    - Tip: Write small, composable functions with single responsibilities
      Why: Smaller units are easier to test, reason about, and change without unintended side effects.
    - Tip: Document decisions, not mechanics
      Why: Rationale and trade-offs help future maintainers understand context and avoid repeating past mistakes.
    - Tip: Treat tests as part of the API
      Why: Well-structured tests communicate expected behavior and protect critical flows from regressions.
    - Tip: Fail fast with explicit validation and error handling
      Why: Clear errors shorten debugging cycles and improve reliability in production.
    - Tip: Prefer deterministic builds and reproducible environments
      Why: Reproducibility makes CI trustworthy and reduces "it works on my machine" failures.
    - Tip: Keep dependencies current with a review cadence
      Why: Planned upgrades reduce security exposure and avoid disruptive catch-up work.
    - Tip: Use version control for all work, including experiments
      Why: History enables safe iteration, easier collaboration, and rapid rollback.
    - Tip: Review code for correctness, readability, and operability
      Why: Balanced reviews catch defects and ensure code can be supported in production.
    - Tip: Design APIs with stability and clarity in mind
      Why: Predictable interfaces reduce downstream churn and simplify integrations.
    - Tip: Instrument critical paths with metrics and logs
      Why: Operational visibility is essential for troubleshooting and capacity planning.
    - Tip: Automate repetitive tasks with scripts or tooling
      Why: Automation reduces human error and frees time for higher-impact work.
    - Tip: Establish clear ownership for services and components
      Why: Ownership improves response times and encourages long-term stewardship.
    - Tip: Use meaningful branch names and structured commits
      Why: Good metadata makes code history searchable and change intent clear.
    - Tip: Adopt linting and formatting as part of CI
      Why: Consistent style reduces review noise and prevents avoidable defects.
    - Tip: Prefer migrations and feature flags for risky changes
      Why: Controlled rollouts reduce downtime and allow fast rollback.
    - Tip: Back up critical data and test restores
      Why: Backups only matter if recovery is proven and timely.
    - Tip: Optimize after measuring, not before
      Why: Data-driven performance work prevents wasted effort and unexpected regressions.
    - Tip: Use containerization or standard runbooks for services
      Why: Consistent execution environments simplify deployment and incident response.
    - Tip: Keep documentation close to the code
      Why: Proximity increases the chance that docs stay current and actionable.
    - Tip: Keep the execution surface small and explicit
      Why: Narrow boundaries reduce risk and make automation behavior predictable.
    - Tip: Declare inputs and outputs for every automated step
      Why: Explicit I/O makes workflows testable and repeatable.
    - Tip: Add validation gates before shipping changes
      Why: Verification prevents confident-but-wrong output from reaching production.
    - Tip: Capture context in lightweight markdown notes
      Why: Short, scoped notes preserve intent without slowing down iteration.
    - Tip: Keep homepages scannable with clear hierarchy
      Why: Visitors find the right entry points faster when layout is predictable.
    - Tip: Group docs by type and surface labels in the UI
      Why: Clear labels reduce cognitive load and help readers pick the right depth.
    - Tip: Always do a task manually before automating it
      Why: Manual execution reveals hidden steps and edge cases automation must capture.
    - Tip: Keep configuration separated from code
      Why: Decoupling config enables safer deployments and easier environment changes.
    - Tip: Let interfaces drive development
      Why: Stable interfaces reduce churn and keep systems composable.
    - Tip: Split big changes into smaller reviewable iterations
      Why: Smaller diffs reduce risk and speed up feedback cycles.
    - Tip: Bootstrap environments explicitly
      Why: Reliable onboarding depends on predictable setup steps.
    - Tip: Treat failures as attempts and extract the lesson
      Why: Each failure yields information that improves the system.
- Group: AI
  Tips:
    - Tip: Prefer prompt-as-workflow for multi-step AI tasks
      Why: Structured steps with explicit inputs and outputs keep automation deterministic and auditable.
    - Tip: Declare a single output type per artifact
      Why: Separating machine prompts from narrative avoids ambiguity and aligns with output contracts.
    - Tip: Bound the work with explicit step and file limits
      Why: Guardrails prevent scope creep and enforce manageable iteration sizes.
    - Tip: Make AI outputs repo-scoped and tool-oriented
      Why: Concrete paths and CLI steps are easier to execute and review than vague guidance.
    - Tip: Capture rationale when generating workflows
      Why: Decision context helps reviewers understand why a step exists and what it protects.
    - Tip: Avoid hidden side effects in AI-generated changes
      Why: Explicitly declared modifications make reviews faster and reduce risk.
    - Tip: Use deterministic language and avoid recursive prompt chains
      Why: Determinism improves repeatability and reduces unexpected tool behavior.
    - Tip: Separate execution from artifact generation
      Why: Keeping agents in artifact-only mode preserves safety boundaries.
    - Tip: Store prompts as versioned artifacts
      Why: Versioned prompts preserve intent and make automation reproducible.
    - Tip: Use context resolvers before asking for solutions
      Why: Deterministic context reduces guessing and improves reliability.
    - Tip: Require verification steps in AI workflows
      Why: Built-in checks prevent regressions and make results auditable.
    - Tip: Gate high-risk changes with human approval checkpoints
      Why: Human-in-the-loop control catches ambiguity before execution.
    - Tip: Add metadata to every artifact (title, type, description)
      Why: Metadata makes discovery and automation indexing reliable.
    - Tip: Prefer type-aware indexes over monolithic lists
      Why: Segmented indexes scale better as content grows.
